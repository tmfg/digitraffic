name: "Trufflehog secret scanning"

on:
  push:
  pull_request:

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0

      - name: Secret scanning
        uses: trufflesecurity/trufflehog@d411fff7b8879a62509f3fa98c07f247ac089a51 # v3.95.5
        with:
          version: 3.94.2@sha256:9587195ca599f525202d19427d4e069a6bbc714e596d693e3041c57a22f5c13b
          base: ""
          head: ${{ github.ref_name }}
          extra_args: --exclude-paths=.github/trufflehog-exclude.txt --results=verified,unknown
